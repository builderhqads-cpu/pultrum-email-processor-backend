# Production stack for a single VPS (Hostinger).
# Usage: docker compose -f docker-compose.prod.yml up -d --build
#
# Values like ${POSTGRES_USER} are read from the .env file in this directory.

services:
  api:
    build: .
    image: pultrum-mail-processor
    container_name: pultrum-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      # Inside the compose network the DB/Redis are reachable by service name,
      # so these override whatever points at localhost in .env.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "3000"

  postgres:
    image: postgres:16-alpine
    container_name: pultrum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pultrum-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:alpine
    container_name: pultrum-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
